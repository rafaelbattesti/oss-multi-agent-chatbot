name: oss-multi-agent-chatbot

services:

  # ── Shared Infrastructure ──────────────────────────────────────────────────

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # CHANGEME
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "/etc/redis/redis.conf"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dex Authentication (OIDC/OAuth2) ──────────────────────────────────────
  # Browser OAuth flows require `127.0.0.1 dex` in /etc/hosts on the host.

  dex:
    image: dexidp/dex:latest
    restart: unless-stopped
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./infrastructure/dex/config.yaml:/etc/dex/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── Vector Database ────────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    expose:
      - "6335"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./infrastructure/qdrant/production.yaml:/qdrant/config/production.yaml:ro

  # ── Agent Gateway (solo.io) — remapped to 3002 (langfuse-web owns 3000) ──

  agentgateway:
    image: cr.agentgateway.dev/agentgateway:v1.3.0-alpha.1
    restart: unless-stopped
    ports:
      - "3002:3000"
      - "127.0.0.1:15000:15000"
    volumes:
      - ./infrastructure/agentgateway/config.yaml:/config.yaml:ro
    environment:
      - ADMIN_ADDR=0.0.0.0:15000
    command: ["-f", "/config.yaml"]

  # ── Agent Registry (solo.io) ──────────────────────────────────────────────
  # Image is published to GHCR; ensure the package visibility is set to public
  # or authenticate: `echo $CR_PAT | docker login ghcr.io -u <user> --password-stdin`

  agentregistry:
    image: ghcr.io/agentregistry-dev/agentregistry/server:v0.3.3
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./infrastructure/agentregistry/config.env
    depends_on:
      postgres:
        condition: service_healthy

  # ── Langfuse v3 ────────────────────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./infrastructure/clickhouse/config.xml:/etc/clickhouse-server/config.d/config.xml:ro
      - ./infrastructure/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      MINIO_ROOT_USER: minio          # CHANGEME
      MINIO_ROOT_PASSWORD: miniosecret # CHANGEME
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9090"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio miniosecret &&
      mc mb --ignore-existing local/langfuse
      "

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ./infrastructure/langfuse/config.env

  # ── A2A Servers ──────────────────────────────────────────────────────────────

  orchestrator:
    build:
      context: ./platform/agents/orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9999:9999"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./infrastructure/orchestrator/config.env

  chat:
    build:
      context: ./platform/agents/chat
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9998:9998"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./infrastructure/chat/config.env

  # ── Chat UI ────────────────────────────────────────────────────────────────────

  chat-ui:
    build:
      context: ./apps/chat-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:3000"
    env_file:
      - ./infrastructure/chat-ui/config.env

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ./infrastructure/langfuse/config.env

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
