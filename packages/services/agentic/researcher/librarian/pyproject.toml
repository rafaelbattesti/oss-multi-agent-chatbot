[project]
name = "agent-researcher"
version = "0.1.0"
description = "Researcher agent: gathers arXiv evidence (via MCP) and synthesizes findings."
requires-python = ">=3.12,<3.13"
dependencies = [
    "thesis-common",
    "langgraph>=0.2",
    "langchain-mcp-adapters>=0.1",
]

[project.scripts]
agent-researcher = "researcher.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/researcher"]
