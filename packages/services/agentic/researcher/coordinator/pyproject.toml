[project]
name = "agent-coordinator"
version = "0.1.0"
description = "Coordinator agent: orchestrates researcher/synthesizer/critic into a thesis."
requires-python = ">=3.12,<3.13"
dependencies = [
    "thesis-common",
    "langgraph>=0.2",
]

[project.scripts]
agent-coordinator = "coordinator.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coordinator"]
