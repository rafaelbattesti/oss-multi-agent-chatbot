[project]
name = "mcp-arxiv"
version = "0.1.0"
description = "MCP server exposing an arXiv search tool over streamable-HTTP."
requires-python = ">=3.12,<3.13"
dependencies = [
    "mcp>=1.2",
    "arxiv>=2.1",
]

[project.scripts]
mcp-arxiv = "mcp_arxiv.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_arxiv"]
