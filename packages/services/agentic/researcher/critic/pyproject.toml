[project]
name = "agent-critic"
version = "0.1.0"
description = "Critic agent: judges whether a thesis draft is viable."
requires-python = ">=3.12,<3.13"
dependencies = [
    "thesis-common",
    "langgraph>=0.2",
]

[project.scripts]
agent-critic = "critic.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/critic"]
