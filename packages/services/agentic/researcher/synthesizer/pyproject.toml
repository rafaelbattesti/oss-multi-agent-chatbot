[project]
name = "agent-synthesizer"
version = "0.1.0"
description = "Synthesizer agent: composes a thesis statement and argument from findings."
requires-python = ">=3.12,<3.13"
dependencies = [
    "thesis-common",
    "langgraph>=0.2",
]

[project.scripts]
agent-synthesizer = "synthesizer.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/synthesizer"]
